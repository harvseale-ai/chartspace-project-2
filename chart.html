<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chart Card</title>
    <link rel="stylesheet" href="assets/css/chart.css" />
  </head>
  <body>
    <div class="card">
      <div class="card-header">
        <div class="title-group">
          <h2>Chart</h2>
          <p class="chart-desc">Is this chart description</p>
        </div>

        <div class="actions">
          <span>👍 Yes</span>
          <span>👎 No</span>
        </div>
      </div>

      <div class="chart-wrap chart" >
        <svg
          id="chartSvg"
          class="chart-svg"
          viewBox="0 0 760 420"
          aria-label="Line chart"
          role="img"
        ></svg>
      </div>
    </div>
    <div class="y-axis">
      <span>50</span>
      <span>40</span>
      <span>30</span>
      <span>10</span>
      <span>0</span>
    </div>

    

    <script src="assets/js/app.js"></script>
  </body>
</html>
